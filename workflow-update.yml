# ============================================================
# GitHub Actions — Build, Push & Deploy
# CI/CD pipeline for compliant deployments to Azure Container App.
#
# How it works:
# 1. Builds Docker image, tags with commit SHA + :latest
# 2. Pushes to ACR using admin credentials (ACR_USERNAME/ACR_PASSWORD)
# 3. Authenticates to Azure via service principal (client credentials)
# 4. Updates Container App directly with az containerapp update
#
# Why not OIDC?
# Conditional Access Policy (AADSTS53003) blocks federated identity
# token issuance from GitHub-hosted runners. Client credentials
# (grant_type=client_credentials) uses a different OAuth2 flow that
# is not subject to user-targeted CAPs.
#
# Required secrets:
#   ACR_USERNAME / ACR_PASSWORD  — ACR admin credentials
#   AZURE_CLIENT_ID              — Service principal app ID
#   AZURE_CLIENT_SECRET          — Service principal secret
#   AZURE_TENANT_ID              — Azure AD tenant ID
#
# To create the service principal (one-time setup):
#   az ad sp create-for-rbac --name "compliancedemo-cicd" \
#     --role Contributor \
#     --scopes /subscriptions/cbf44432-7f45-4906-a85d-d2b14a1e8328/resourceGroups/rg-compliancedemo
#   Then add appId → AZURE_CLIENT_ID, password → AZURE_CLIENT_SECRET
# ============================================================
name: Deploy Container App

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
      - '.github/workflows/deploy-container-app.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME: acrcompliancedemoenqgb2
  IMAGE_NAME: compliance-demo-api
  RESOURCE_GROUP: rg-compliancedemo
  CONTAINER_APP: ca-api-compliancedemo
  AZURE_SUBSCRIPTION_ID: cbf44432-7f45-4906-a85d-d2b14a1e8328

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | \
            docker login "${{ env.ACR_NAME }}.azurecr.io" \
              -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"

          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "deployed-by=pipeline" \
            --label "pipeline-run-id=${{ github.run_id }}" \
            --label "commit-sha=${{ github.sha }}" \
            --label "branch=${{ github.ref_name }}" \
            -t "$IMAGE_TAG" \
            -t "$LATEST_TAG" \
            src/api/

          docker push "$IMAGE_TAG"
          docker push "$LATEST_TAG"
          echo "✅ Pushed: $IMAGE_TAG"

      - name: Azure Login (Service Principal)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        run: |
          echo "Deploying ${{ github.sha }} to ${{ env.CONTAINER_APP }}..."

          az containerapp update \
            --name "${{ env.CONTAINER_APP }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --image "${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --set-env-vars \
              "COMMIT_SHA=${{ github.sha }}" \
              "DEPLOYED_BY=pipeline" \
            --output none

          echo "✅ Deployment complete"

      - name: Summary
        run: |
          echo "### ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container App**: ${{ env.CONTAINER_APP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL**: https://ca-api-compliancedemo.ashypond-ed21e6b9.eastus2.azurecontainerapps.io" >> $GITHUB_STEP_SUMMARY
