# ============================================================
# GitHub Actions — Build & Push to ACR
# CI/CD pipeline for compliant deployments to Azure Container App.
#
# How it works:
# 1. Builds Docker image with immutable compliance labels
# 2. Pushes to ACR using admin credentials (no Azure AD auth needed)
# 3. ACR emits Event Grid "ImagePushed" event
# 4. Event Grid → Automation Runbook → az containerapp update
#    (runs inside Azure with managed identity — bypasses CAP)
#
# Compliance signals (tamper-proof):
#   - Docker image labels: commit-sha, pipeline-run-id, branch, repo
#     (immutable once pushed to ACR)
#   - Activity Log caller: Automation MI (Azure AD enforced)
#
# Required secrets:
#   ACR_USERNAME / ACR_PASSWORD  — ACR admin credentials
# ============================================================
name: Deploy Container App

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
      - '.github/workflows/deploy-container-app.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME: acrcompliancedemoenqgb2
  IMAGE_NAME: compliance-demo-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | \
            docker login "${{ env.ACR_NAME }}.azurecr.io" \
              -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build and push image
        run: |
          SHA_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"

          # Immutable compliance labels — baked into the image, can't be tampered
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "deployed-by=pipeline" \
            --label "pipeline-run-id=${{ github.run_id }}" \
            --label "commit-sha=${{ github.sha }}" \
            --label "branch=${{ github.ref_name }}" \
            --label "repository=${{ github.repository }}" \
            --label "workflow=${{ github.workflow }}" \
            -t "$SHA_TAG" \
            -t "$LATEST_TAG" \
            src/api/

          # Push SHA-tagged image first (triggers Event Grid → deploy)
          docker push "$SHA_TAG"
          # Push :latest as well (fallback reference)
          docker push "$LATEST_TAG"
          echo "✅ Pushed: $SHA_TAG"
          echo "🔄 Event Grid will trigger deployment automatically"

      - name: Summary
        run: |
          echo "### ✅ Image Pushed to ACR" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy**: Automatic via Event Grid → Automation Runbook" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL**: https://ca-api-compliancedemo.ashypond-ed21e6b9.eastus2.azurecontainerapps.io" >> $GITHUB_STEP_SUMMARY
