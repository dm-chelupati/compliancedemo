# ============================================================
# GitHub Actions — Build & Deploy Container App
# This is the CI/CD pipeline that represents "compliant" deployments.
# Pushes image to ACR → Container App auto-deploys via webhook.
# ============================================================
name: Deploy Container App

on:
  push:
    branches: [main]
    paths:
      - 'src/api/**'
  workflow_dispatch:

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: compliance-demo-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"

          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "deployed-by=pipeline" \
            --label "pipeline-run-id=${{ github.run_id }}" \
            --label "commit-sha=${{ github.sha }}" \
            --label "branch=${{ github.ref_name }}" \
            -t "$IMAGE_TAG" \
            -t "$LATEST_TAG" \
            src/api/

          docker push "$IMAGE_TAG"
          docker push "$LATEST_TAG"

          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL**: https://ca-api-compliancedemo.ashypond-ed21e6b9.eastus2.azurecontainerapps.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Container App will auto-deploy via ACR webhook." >> $GITHUB_STEP_SUMMARY
